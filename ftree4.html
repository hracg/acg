<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Tree Builder</title>
<style>
*{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
html,body{ width:100%; height:100%; overflow:hidden; font-family:Arial,sans-serif; }

/* ── infinite yellow world ── */
#world{
    position:fixed; inset:0;
    overflow:hidden;
    touch-action:none;
    cursor:default;
    background:yellow;
}
#svgLayer{
    position:absolute; inset:0;
    width:100%; height:100%;
    pointer-events:none;
    z-index:1;
}
#shapeLayer{
    position:absolute; top:0; left:0;
    width:0; height:0;
    z-index:2;
    transform-origin:0 0;
}

/* ── shapes (original style) ── */
.member{
    position:absolute;
    display:flex;
    flex-direction:column;
    align-items:center;
    transform:translate(-50%,-50%);
}
.shape{
    border:2px solid black;
    background:white;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    font-weight:bold;
    padding:2px;
    box-sizing:border-box;
    overflow:hidden;
}
.circle  { border-radius:50%; }
.square  { border-radius:0; }
.diamond { transform:rotate(45deg); }
.diamond span{ transform:rotate(-45deg); display:block; }
.selected{ outline:3px solid red; outline-offset:2px; }

/* ── green move button (original style) ── */
.green-btn{
    width:16px;
    height:16px;
    background:green;
    border-radius:50%;
    margin-top:8px;
    border:1px solid black;
    cursor:pointer;
    flex-shrink:0;
}
.green-btn.active-move{
    box-shadow:0 0 0 3px orange;
}

/* ── fixed buttons — original positions ── */
.plus-btn{
    position:fixed;
    right:20px; bottom:20px;
    width:60px; height:60px;
    border:none; border-radius:50%;
    background:blue; color:white;
    font-size:36px; cursor:pointer;
    z-index:1000;
    touch-action:manipulation;
}
.minus-btn{
    position:fixed;
    right:90px; bottom:20px;
    width:60px; height:60px;
    border:none; border-radius:50%;
    background:blue; color:white;
    font-size:36px; cursor:pointer;
    z-index:1000;
    touch-action:manipulation;
}
/* M (maximise/grow) button */
.max-btn{
    position:fixed;
    right:160px; bottom:20px;
    width:60px; height:60px;
    border:none; border-radius:50%;
    background:blue; color:white;
    font-size:26px; font-weight:bold;
    cursor:pointer;
    z-index:1000;
    touch-action:manipulation;
}
/* save button — twice the width of plus, same height */
.save-btn{
    position:fixed;
    right:230px; bottom:20px;
    width:120px; height:60px;
    border:none; border-radius:30px;
    background:green; color:white;
    font-size:18px; font-weight:bold;
    cursor:pointer; z-index:1000;
    display:flex; align-items:center;
    justify-content:center; gap:6px;
    box-shadow:0 3px 8px rgba(0,0,0,.25);
    touch-action:manipulation;
}
.save-btn:active{ transform:scale(.97); }
/* bin button */
.bin-btn{
    position:fixed;
    right:360px; bottom:20px;
    width:60px; height:60px;
    border:none; border-radius:50%;
    background:blue; color:white;
    font-size:26px; cursor:pointer;
    z-index:1000;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
    touch-action:manipulation;
}
.bin-btn.on{ background:crimson; box-shadow:0 0 0 4px orange; }

/* ── pop-up menu (original style) ── */
.menu{
    position:fixed;
    right:25px; bottom:90px;
    z-index:1000;
}
.option{
    width:50px; height:50px;
    margin-bottom:10px;
    background:white;
    border:2px solid black;
    border-radius:50%;
    display:flex; align-items:center;
    justify-content:center;
    cursor:pointer; font-size:22px;
    opacity:0;
    transform:translateY(30px);
    transition:0.3s;
    pointer-events:none;
    touch-action:manipulation;
}
.menu.show .option{
    opacity:1;
    transform:translateY(0);
    pointer-events:auto;
}
/* line option at top of menu */
.option.line-opt{
    font-size:12px; font-weight:700;
}
.option.line-opt.on{
    background:#222; color:#fff;
}

/* ── saving overlay ── */
#ov{
    display:none; position:fixed; inset:0;
    background:rgba(0,0,0,.45); z-index:99999;
    align-items:center; justify-content:center;
    color:#fff; font-size:22px; font-weight:bold;
}
#ov.show{ display:flex; }

body.linedraw{ cursor:crosshair; }
</style>
</head>
<body>

<!-- infinite world -->
<div id="world">
    <svg id="svgLayer"></svg>
    <div id="shapeLayer"></div>
</div>

<!-- original-style menu -->
<div class="menu" id="menu">
    <div class="option line-opt" id="lineOpt">╱ Line</div>
    <div class="option" id="ciOpt">⬤</div>
    <div class="option" id="sqOpt">■</div>
    <div class="option" id="dmOpt">◆</div>
</div>

<!-- original-style buttons -->
<button class="bin-btn" id="binBtn">🗑</button>
<button class="save-btn" id="saveBtn">💾 Save</button>
<button class="max-btn"  id="maxBtn">M</button>
<button class="minus-btn" id="minBtn">−</button>
<button class="plus-btn"  id="plusBtn">+</button>

<div id="ov">Saving…</div>

<script>
/* ═══════════════════════════════════════════
   VIEW STATE  — infinite world coords
═══════════════════════════════════════════ */
let panX=0, panY=0, zoom=1;

const worldEl    = document.getElementById("world");
const svgLayer   = document.getElementById("svgLayer");
const shapeLayer = document.getElementById("shapeLayer");

function applyView(){
    shapeLayer.style.transform=`translate(${panX}px,${panY}px) scale(${zoom})`;
    lines.forEach(updateSvgLine);
}
const w2s=(wx,wy)=>({ x:wx*zoom+panX, y:wy*zoom+panY });
const s2w=(sx,sy)=>({ x:(sx-panX)/zoom, y:(sy-panY)/zoom });

/* ═══════════════════════════════════════════
   UID
═══════════════════════════════════════════ */
let _seed=Date.now();
const uid=p=>p+(_seed++).toString(36);

/* ═══════════════════════════════════════════
   APP STATE
═══════════════════════════════════════════ */
let shapeSize  = 70;
let members    = [];   // {id,type,name,wx,wy,size,el}
let lines      = [];   // {id,wx1,wy1,wx2,wy2,svgEl}
let moveMember = null; // member whose green-btn was clicked
let binMode    = false;
let lineMode   = false;
let lineStart  = null;
let previewSvg = null;
let menuOpen   = false;

/* ═══════════════════════════════════════════
   TOUCH PAN / PINCH-ZOOM
═══════════════════════════════════════════ */
let activeTouches={}, lastPinch=null;
let panFinger=null, panFOrigin=null, panWOrigin=null;

worldEl.addEventListener("touchstart",e=>{
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t=>{
        activeTouches[t.identifier]={x:t.clientX,y:t.clientY};
    });
    const n=Object.keys(activeTouches).length;
    if(n===2){ lastPinch=pinchDist(); }
    if(n===1 && !lineMode && !binMode && !moveMember){
        const t=e.changedTouches[0];
        panFinger=t.identifier;
        panFOrigin={x:t.clientX,y:t.clientY};
        panWOrigin={x:panX,y:panY};
    }
},{passive:false});

worldEl.addEventListener("touchmove",e=>{
    e.preventDefault();
    Array.from(e.changedTouches).forEach(t=>{
        activeTouches[t.identifier]={x:t.clientX,y:t.clientY};
    });
    const n=Object.keys(activeTouches).length;
    if(n===2){
        const d=pinchDist();
        if(lastPinch&&d){
            const mid=pinchMid();
            const nz=Math.min(4,Math.max(0.15,zoom*(d/lastPinch)));
            panX=mid.x-(mid.x-panX)*(nz/zoom);
            panY=mid.y-(mid.y-panY)*(nz/zoom);
            zoom=nz; lastPinch=d; applyView();
        }
    } else if(n===1 && panFinger!==null){
        const t=Array.from(e.changedTouches).find(tt=>tt.identifier===panFinger);
        if(t){
            panX=panWOrigin.x+(t.clientX-panFOrigin.x);
            panY=panWOrigin.y+(t.clientY-panFOrigin.y);
            applyView();
        }
    }
},{passive:false});

worldEl.addEventListener("touchend",e=>{
    Array.from(e.changedTouches).forEach(t=>delete activeTouches[t.identifier]);
    if(!activeTouches[panFinger]) panFinger=null;
    if(Object.keys(activeTouches).length<2) lastPinch=null;
},{passive:false});

function pinchDist(){
    const ids=Object.keys(activeTouches); if(ids.length<2) return 0;
    const a=activeTouches[ids[0]],b=activeTouches[ids[1]];
    return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2);
}
function pinchMid(){
    const ids=Object.keys(activeTouches);
    const a=activeTouches[ids[0]],b=activeTouches[ids[1]];
    return{x:(a.x+b.x)/2,y:(a.y+b.y)/2};
}

// Mouse wheel zoom
worldEl.addEventListener("wheel",e=>{
    e.preventDefault();
    const r=e.deltaY<0?1.1:1/1.1;
    const nz=Math.min(4,Math.max(0.15,zoom*r));
    panX=e.clientX-(e.clientX-panX)*(nz/zoom);
    panY=e.clientY-(e.clientY-panY)*(nz/zoom);
    zoom=nz; applyView();
},{passive:false});

// Middle-mouse pan
let mmPan=false,mmS={x:0,y:0},mmO={x:0,y:0};
worldEl.addEventListener("mousedown",e=>{
    if(e.button===1){e.preventDefault();mmPan=true;mmS={x:e.clientX,y:e.clientY};mmO={x:panX,y:panY};}
});
document.addEventListener("mousemove",e=>{
    if(!mmPan)return;
    panX=mmO.x+(e.clientX-mmS.x); panY=mmO.y+(e.clientY-mmS.y); applyView();
});
document.addEventListener("mouseup",e=>{ if(e.button===1)mmPan=false; });

/* ═══════════════════════════════════════════
   PREVIEW LINE (mouse hover while drawing)
═══════════════════════════════════════════ */
worldEl.addEventListener("mousemove",e=>{
    if(!lineMode||!lineStart||!previewSvg) return;
    const sp=w2s(lineStart.x,lineStart.y);
    previewSvg.setAttribute("x1",sp.x); previewSvg.setAttribute("y1",sp.y);
    previewSvg.setAttribute("x2",e.clientX); previewSvg.setAttribute("y2",e.clientY);
});

/* ═══════════════════════════════════════════
   WORLD TAP — move shape / draw line / delete line
═══════════════════════════════════════════ */
function onWorldTap(sx,sy){
    const wp=s2w(sx,sy);

    /* BIN: delete nearest line */
    if(binMode){
        tryDeleteLine(wp.x,wp.y); return;
    }

    /* LINE DRAW */
    if(lineMode){
        if(!lineStart){
            lineStart={x:wp.x,y:wp.y};
            const sp=w2s(wp.x,wp.y);
            previewSvg=makeSvgLine(sp.x,sp.y,sp.x,sp.y,"#555",true);
        } else {
            const id=uid("l");
            const spA=w2s(lineStart.x,lineStart.y), spB=w2s(wp.x,wp.y);
            const svgEl=makeSvgLine(spA.x,spA.y,spB.x,spB.y,"#000",false,id);
            lines.push({id,wx1:lineStart.x,wy1:lineStart.y,wx2:wp.x,wy2:wp.y,svgEl});
            if(previewSvg){previewSvg.remove();previewSvg=null;}
            lineStart=null; deactivateLine(); persist();
        }
        return;
    }

    /* MOVE SHAPE (green-btn was clicked) */
    if(moveMember){
        moveMember.wx=wp.x; moveMember.wy=wp.y;
        moveMember.el.style.left=wp.x+"px";
        moveMember.el.style.top =wp.y+"px";
        moveMember.el.querySelector(".shape").classList.remove("selected");
        moveMember.el.querySelector(".green-btn").classList.remove("active-move");
        moveMember=null; persist(); return;
    }
}

/* listen on world background (not on shapes) */
worldEl.addEventListener("click",e=>{
    if(e.target.closest(".member")||isUITarget(e.target)) return;
    onWorldTap(e.clientX,e.clientY);
});
worldEl.addEventListener("touchend",e=>{
    if(Object.keys(activeTouches).length>0) return; // was multi-touch
    const t=e.changedTouches[0];
    if(e.target.closest(".member")||isUITarget(e.target)) return;
    onWorldTap(t.clientX,t.clientY);
},{passive:false});

function isUITarget(el){
    return el.closest(".menu")||el.closest(".plus-btn")||el.closest(".minus-btn")||
           el.closest(".max-btn")||el.closest(".save-btn")||el.closest(".bin-btn")||
           el.id==="plusBtn"||el.id==="minBtn"||el.id==="maxBtn"||
           el.id==="saveBtn"||el.id==="binBtn";
}

/* ═══════════════════════════════════════════
   SVG LINES
═══════════════════════════════════════════ */
function makeSvgLine(x1,y1,x2,y2,color,dashed,id){
    const l=document.createElementNS("http://www.w3.org/2000/svg","line");
    l.setAttribute("x1",x1);l.setAttribute("y1",y1);
    l.setAttribute("x2",x2);l.setAttribute("y2",y2);
    l.setAttribute("stroke",color);
    l.setAttribute("stroke-width","2.5");
    l.setAttribute("stroke-linecap","round");
    if(dashed) l.setAttribute("stroke-dasharray","8,5");
    if(id) l.dataset.lid=id;
    svgLayer.appendChild(l); return l;
}
function updateSvgLine(l){
    const a=w2s(l.wx1,l.wy1),b=w2s(l.wx2,l.wy2);
    l.svgEl.setAttribute("x1",a.x);l.svgEl.setAttribute("y1",a.y);
    l.svgEl.setAttribute("x2",b.x);l.svgEl.setAttribute("y2",b.y);
}
function tryDeleteLine(wx,wy){
    const THRESH=18/zoom;
    for(let i=lines.length-1;i>=0;i--){
        const l=lines[i];
        const dx=l.wx2-l.wx1,dy=l.wy2-l.wy1,len2=dx*dx+dy*dy;
        let dist;
        if(len2===0){ dist=Math.sqrt((wx-l.wx1)**2+(wy-l.wy1)**2); }
        else{
            const tt=Math.max(0,Math.min(1,((wx-l.wx1)*dx+(wy-l.wy1)*dy)/len2));
            dist=Math.sqrt((wx-(l.wx1+tt*dx))**2+(wy-(l.wy1+tt*dy))**2);
        }
        if(dist<=THRESH){ l.svgEl.remove(); lines.splice(i,1); persist(); return; }
    }
}

/* ═══════════════════════════════════════════
   SHAPES  (original green-btn mechanic)
═══════════════════════════════════════════ */
function addShape(type){
    const name=prompt("Enter name:"); if(!name) return;
    closeMenu();
    const wc=s2w(window.innerWidth/2,window.innerHeight/2);
    mkMember(type,name,wc.x,wc.y,shapeSize,uid("m"));
    persist();
}

function mkMember(type,name,wx,wy,size,id){
    size=size||shapeSize;
    const el=document.createElement("div");
    el.className="member"; el.dataset.mid=id;
    el.style.left=wx+"px"; el.style.top=wy+"px";

    const sh=document.createElement("div");
    sh.className="shape "+type;
    sh.style.width =size+"px";
    sh.style.height=size+"px";
    sh.style.fontSize=Math.max(4,size/6)+"px";
    sh.innerHTML=type==="diamond"?"<span>"+esc(name)+"</span>":esc(name);

    /* green button — original mechanic */
    const gb=document.createElement("div");
    gb.className="green-btn";

    gb.addEventListener("click",e=>{
        e.stopPropagation();
        if(binMode) return;
        if(lineMode) return;
        // deselect any current move
        if(moveMember && moveMember!==mbr){
            moveMember.el.querySelector(".shape").classList.remove("selected");
            moveMember.el.querySelector(".green-btn").classList.remove("active-move");
        }
        // toggle select this one
        if(moveMember===mbr){
            sh.classList.remove("selected");
            gb.classList.remove("active-move");
            moveMember=null;
        } else {
            sh.classList.add("selected");
            gb.classList.add("active-move");
            moveMember=mbr;
        }
    });
    gb.addEventListener("touchend",e=>{
        e.preventDefault(); e.stopPropagation();
        gb.click();
    },{passive:false});

    /* bin: click shape directly */
    el.addEventListener("click",e=>{
        if(!binMode) return;
        e.stopPropagation();
        el.remove(); members=members.filter(m=>m!==mbr); persist();
    });

    el.appendChild(sh); el.appendChild(gb);
    shapeLayer.appendChild(el);

    const mbr={id,type,name,wx,wy,size,el};
    members.push(mbr);
    return mbr;
}
const esc=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");

/* ═══════════════════════════════════════════
   SIZE  +/−/M
═══════════════════════════════════════════ */
function changeSize(d){
    shapeSize=Math.max(8,shapeSize+d);
    members.forEach(m=>{
        m.size=shapeSize;
        const sh=m.el.querySelector(".shape");
        sh.style.width =shapeSize+"px";
        sh.style.height=shapeSize+"px";
        sh.style.fontSize=Math.max(4,shapeSize/6)+"px";
    });
    persist();
}

/* ═══════════════════════════════════════════
   LINE MODE
═══════════════════════════════════════════ */
function activateLine(){
    closeMenu(); lineMode=true;
    document.body.classList.add("linedraw");
    document.getElementById("lineOpt").classList.add("on");
    if(moveMember){
        moveMember.el.querySelector(".shape").classList.remove("selected");
        moveMember.el.querySelector(".green-btn").classList.remove("active-move");
        moveMember=null;
    }
}
function deactivateLine(){
    lineMode=false;
    document.body.classList.remove("linedraw");
    document.getElementById("lineOpt").classList.remove("on");
    lineStart=null;
    if(previewSvg){previewSvg.remove();previewSvg=null;}
}

/* ═══════════════════════════════════════════
   BIN
═══════════════════════════════════════════ */
function toggleBin(){
    binMode=!binMode;
    document.getElementById("binBtn").classList.toggle("on",binMode);
    if(binMode){
        deactivateLine(); closeMenu();
        if(moveMember){
            moveMember.el.querySelector(".shape").classList.remove("selected");
            moveMember.el.querySelector(".green-btn").classList.remove("active-move");
            moveMember=null;
        }
    }
}

/* ═══════════════════════════════════════════
   MENU
═══════════════════════════════════════════ */
function toggleMenu(){ menuOpen=!menuOpen; document.getElementById("menu").classList.toggle("show",menuOpen); }
function closeMenu(){ menuOpen=false; document.getElementById("menu").classList.remove("show"); }
document.addEventListener("click",e=>{
    const m=document.getElementById("menu");
    if(!m.contains(e.target)&&e.target!==document.getElementById("plusBtn")) closeMenu();
});

/* ═══════════════════════════════════════════
   PERSIST
═══════════════════════════════════════════ */
const SKEY="ft_v8";
function persist(){
    try{
        localStorage.setItem(SKEY,JSON.stringify({
            panX,panY,zoom,shapeSize,
            members:members.map(m=>({id:m.id,type:m.type,name:m.name,wx:m.wx,wy:m.wy,size:m.size})),
            lines:lines.map(l=>({id:l.id,wx1:l.wx1,wy1:l.wy1,wx2:l.wx2,wy2:l.wy2}))
        }));
    }catch(e){console.warn(e);}
}
function loadState(){
    try{
        const raw=localStorage.getItem(SKEY); if(!raw) return;
        const d=JSON.parse(raw);
        panX=d.panX||0; panY=d.panY||0; zoom=d.zoom||1; shapeSize=d.shapeSize||70;
        applyView();
        (d.members||[]).forEach(m=>mkMember(m.type,m.name,m.wx,m.wy,m.size,m.id));
        (d.lines||[]).forEach(l=>{
            const svgEl=makeSvgLine(0,0,0,0,"#000",false,l.id);
            const entry={id:l.id,wx1:l.wx1,wy1:l.wy1,wx2:l.wx2,wy2:l.wy2,svgEl};
            lines.push(entry); updateSvgLine(entry);
        });
    }catch(e){console.warn(e);}
}

/* ═══════════════════════════════════════════
   SAVE  — offscreen canvas, crop to content,
           2px yellow border around each shape
═══════════════════════════════════════════ */
function saveImg(){
    if(moveMember){
        moveMember.el.querySelector(".shape").classList.remove("selected");
        moveMember.el.querySelector(".green-btn").classList.remove("active-move");
        moveMember=null;
    }
    deactivateLine(); if(binMode) toggleBin();

    if(members.length===0&&lines.length===0){
        alert("Nothing to save yet!"); return;
    }

    const ov=document.getElementById("ov"); ov.classList.add("show");

    const PAD=24, SCALE=2;
    let mnX=Infinity,mnY=Infinity,mxX=-Infinity,mxY=-Infinity;
    members.forEach(m=>{
        const h=m.size/2;
        mnX=Math.min(mnX,m.wx-h-PAD); mnY=Math.min(mnY,m.wy-h-PAD);
        mxX=Math.max(mxX,m.wx+h+PAD); mxY=Math.max(mxY,m.wy+h+PAD);
    });
    lines.forEach(l=>{
        mnX=Math.min(mnX,l.wx1-PAD,l.wx2-PAD); mnY=Math.min(mnY,l.wy1-PAD,l.wy2-PAD);
        mxX=Math.max(mxX,l.wx1+PAD,l.wx2+PAD); mxY=Math.max(mxY,l.wy1+PAD,l.wy2+PAD);
    });

    const W=Math.ceil((mxX-mnX)*SCALE), H=Math.ceil((mxY-mnY)*SCALE);
    const oc=document.createElement("canvas"); oc.width=W; oc.height=H;
    const ctx=oc.getContext("2d");
    const w2c=(wx,wy)=>({x:(wx-mnX)*SCALE, y:(wy-mnY)*SCALE});

    // yellow background
    ctx.fillStyle="#ffff00"; ctx.fillRect(0,0,W,H);

    // black lines
    ctx.strokeStyle="#000"; ctx.lineWidth=2.5*SCALE; ctx.lineCap="round";
    lines.forEach(l=>{
        const a=w2c(l.wx1,l.wy1),b=w2c(l.wx2,l.wy2);
        ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
    });

    // shapes with 2px yellow border
    members.forEach(m=>{
        const {x:cx,y:cy}=w2c(m.wx,m.wy);
        const s=m.size*SCALE;
        ctx.save();
        if(m.type==="circle"){
            // yellow gap ring
            ctx.strokeStyle="#ffff00"; ctx.lineWidth=4*SCALE;
            ctx.beginPath(); ctx.arc(cx,cy,s/2+2*SCALE,0,Math.PI*2); ctx.stroke();
            // shape
            ctx.fillStyle="white"; ctx.strokeStyle="black"; ctx.lineWidth=2*SCALE;
            ctx.beginPath(); ctx.arc(cx,cy,s/2,0,Math.PI*2); ctx.fill(); ctx.stroke();
            drawText(ctx,m.name,cx,cy,s);
        } else if(m.type==="square"){
            const rx=cx-s/2, ry=cy-s/2;
            ctx.strokeStyle="#ffff00"; ctx.lineWidth=4*SCALE;
            ctx.strokeRect(rx-2*SCALE,ry-2*SCALE,s+4*SCALE,s+4*SCALE);
            ctx.fillStyle="white"; ctx.fillRect(rx,ry,s,s);
            ctx.strokeStyle="black"; ctx.lineWidth=2*SCALE; ctx.strokeRect(rx,ry,s,s);
            drawText(ctx,m.name,cx,cy,s);
        } else { // diamond
            ctx.translate(cx,cy); ctx.rotate(Math.PI/4);
            const hs=s/2;
            ctx.strokeStyle="#ffff00"; ctx.lineWidth=4*SCALE;
            ctx.strokeRect(-hs-2*SCALE,-hs-2*SCALE,s+4*SCALE,s+4*SCALE);
            ctx.fillStyle="white"; ctx.fillRect(-hs,-hs,s,s);
            ctx.strokeStyle="black"; ctx.lineWidth=2*SCALE; ctx.strokeRect(-hs,-hs,s,s);
            ctx.rotate(-Math.PI/4);
            drawText(ctx,m.name,0,0,s*0.7);
        }
        ctx.restore();
    });

    ov.classList.remove("show");

    oc.toBlob(blob=>{
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a"); a.download="family_tree.jpeg"; a.href=url; a.click();
        setTimeout(()=>URL.revokeObjectURL(url),5000);
    },"image/jpeg",0.96);
}

function drawText(ctx,text,cx,cy,boxSize){
    const fs=Math.max(8,Math.min(boxSize*.28, boxSize/Math.max(1,text.length)*1.8));
    ctx.fillStyle="#000";
    ctx.font=`bold ${fs}px Arial,sans-serif`;
    ctx.textAlign="center"; ctx.textBaseline="middle";
    const words=text.split(" "), maxW=boxSize*.85, lh=fs*1.25;
    let lns=[""];
    words.forEach(w=>{
        const test=lns[lns.length-1]+(lns[lns.length-1]?" ":"")+w;
        ctx.measureText(test).width<=maxW ? lns[lns.length-1]=test : lns.push(w);
    });
    const th=(lns.length-1)*lh;
    lns.forEach((ln,i)=>ctx.fillText(ln,cx,cy-th/2+i*lh,maxW));
}

/* ═══════════════════════════════════════════
   WIRE BUTTONS
═══════════════════════════════════════════ */
function wire(id,fn){
    const el=document.getElementById(id);
    el.addEventListener("click",   e=>{e.stopPropagation();fn();});
    el.addEventListener("touchend",e=>{e.stopPropagation();e.preventDefault();fn();},{passive:false});
}
wire("plusBtn", toggleMenu);
wire("minBtn",  ()=>changeSize(-5));
wire("maxBtn",  ()=>changeSize(+5));
wire("saveBtn", saveImg);
wire("binBtn",  toggleBin);
wire("lineOpt", activateLine);
wire("ciOpt",   ()=>addShape("circle"));
wire("sqOpt",   ()=>addShape("square"));
wire("dmOpt",   ()=>addShape("diamond"));

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
loadState();
applyView();
</script>
